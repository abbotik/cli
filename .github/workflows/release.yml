name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          out_dir="dist/${target}"
          mkdir -p "${out_dir}"
          cp "target/${target}/release/abbot" "${out_dir}/abbot"
          chmod +x "${out_dir}/abbot"
          tarball="abbotik-cli-${version}-${target}.tar.gz"
          tar -czf "dist/${tarball}" -C "${out_dir}" abbot
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${tarball}" > "dist/${tarball}.sha256"
          else
            shasum -a 256 "dist/${tarball}" > "dist/${tarball}.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/abbotik-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dist/abbotik-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_RELEASES_TOKEN: ${{ secrets.HOMEBREW_RELEASES_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Mirror artifacts to Homebrew releases
        if: ${{ env.HOMEBREW_RELEASES_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HOMEBREW_RELEASES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="abbot-${GITHUB_REF_NAME}"
          release_title="abbot ${GITHUB_REF_NAME}"
          repo="abbotik/homebrew-releases"

          if gh release view "${release_tag}" --repo "${repo}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/*.tar.gz dist/*.tar.gz.sha256 --clobber --repo "${repo}"
          else
            gh release create "${release_tag}" dist/*.tar.gz dist/*.tar.gz.sha256 \
              --repo "${repo}" \
              --title "${release_title}" \
              --notes "Public Homebrew release artifacts for ${release_title}."
          fi

      - name: Update Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' || env.HOMEBREW_RELEASES_TOKEN != '' }}
        env:
          HOMEBREW_RELEASES_TOKEN: ${{ env.HOMEBREW_RELEASES_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          export GH_TOKEN="${HOMEBREW_TAP_TOKEN:-${HOMEBREW_RELEASES_TOKEN}}"

          version="${GITHUB_REF_NAME}"
          release_tag="abbot-${version}"
          tap_repo="abbotik/homebrew-tap"
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          gh repo clone "${tap_repo}" "${workdir}/tap" -- --depth=1

          arm_archive="abbotik-cli-${version}-aarch64-apple-darwin.tar.gz"
          x64_macos_archive="abbotik-cli-${version}-x86_64-apple-darwin.tar.gz"
          x64_linux_archive="abbotik-cli-${version}-x86_64-unknown-linux-gnu.tar.gz"

          arm_checksum="$(awk '{print $1}' "dist/${arm_archive}.sha256")"
          x64_macos_checksum="$(awk '{print $1}' "dist/${x64_macos_archive}.sha256")"
          x64_linux_checksum="$(awk '{print $1}' "dist/${x64_linux_archive}.sha256")"

          formula_path="${workdir}/tap/Formula/abbot.rb"
          cat > "${formula_path}" <<EOF
          class Abbot < Formula
            require "rbconfig"

            desc "Rust CLI for the Abbotik API"
            homepage "https://github.com/abbotik/cli"

            host_os = RUBY_PLATFORM
            host_cpu = RbConfig::CONFIG.fetch("host_cpu")

            if host_os.include?("darwin") && host_cpu.match?(/arm|aarch64/)
              archive = "${arm_archive}"
              checksum = "${arm_checksum}"
            elsif host_os.include?("darwin") && host_cpu == "x86_64"
              archive = "${x64_macos_archive}"
              checksum = "${x64_macos_checksum}"
            elsif host_os.include?("linux")
              archive = "${x64_linux_archive}"
              checksum = "${x64_linux_checksum}"
            else
              raise "Unsupported platform for abbot: #{host_os} / #{host_cpu}"
            end

            url "https://github.com/abbotik/homebrew-releases/releases/download/${release_tag}/#{archive}"
            sha256 checksum
            license "MIT"

            def install
              bin.install "abbot"
            end

            test do
              assert_match "abbot", shell_output("#{bin}/abbot --help")
            end
          end
          EOF

          cd "${workdir}/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/abbot.rb; then
            echo "Formula already matches ${version}"
            exit 0
          fi

          git add Formula/abbot.rb
          git commit -m "Update abbot formula to ${version}"
          git push origin HEAD:main
